<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — MCP Service</title>
    <style>
        /* Design Cloud Temple — dark theme */
        :root { --bg: #0f0f23; --surface: #1a1a2e; --accent: #41a890; --text: #e0e0e0; --muted: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
        .header { background: var(--surface); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .header h1 { color: var(--accent); font-size: 1.2rem; }
        .nav { display: flex; gap: 1rem; }
        .nav button { background: none; border: 1px solid var(--muted); color: var(--text); padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; }
        .nav button.active { border-color: var(--accent); color: var(--accent); }
        .login { max-width: 400px; margin: 4rem auto; padding: 2rem; background: var(--surface); border-radius: 8px; }
        .login input { width: 100%; padding: 0.6rem; margin: 0.5rem 0; background: var(--bg); border: 1px solid var(--muted); color: var(--text); border-radius: 4px; }
        .login button { width: 100%; padding: 0.6rem; background: var(--accent); border: none; color: #fff; border-radius: 4px; cursor: pointer; margin-top: 0.5rem; }
        .content { padding: 2rem; }
        .card { background: var(--surface); padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; }
        .card h3 { color: var(--accent); margin-bottom: 0.5rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #333; }
        th { color: var(--accent); }
        .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 3px; font-size: 0.8rem; }
        .badge-ok { background: #1a4a3a; color: #41a890; }
        .badge-err { background: #4a1a1a; color: #e85d5d; }
        #app { display: none; }
        pre { background: var(--bg); padding: 1rem; border-radius: 4px; overflow-x: auto; font-size: 0.85rem; }
    </style>
</head>
<body>

<!-- Login -->
<div id="login-view" class="login">
    <h2 style="color: var(--accent); margin-bottom: 1rem;">🔐 Admin Console</h2>
    <p style="color: var(--muted); margin-bottom: 1rem;">Entrez votre token admin ou bootstrap key</p>
    <input type="password" id="token-input" placeholder="Bearer token..." />
    <button onclick="doLogin()">Connexion</button>
    <p id="login-error" style="color: #e85d5d; margin-top: 0.5rem; display: none;"></p>
</div>

<!-- App -->
<div id="app">
    <div class="header">
        <h1>🛠️ Admin Console</h1>
        <div class="nav">
            <button class="active" onclick="showView('dashboard')">Dashboard</button>
            <button onclick="showView('tokens')">Tokens</button>
            <button onclick="showView('logs')">Activité</button>
            <button onclick="doLogout()">Déconnexion</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="view-dashboard" class="content">
        <div class="card">
            <h3>État du serveur</h3>
            <div id="health-info">Chargement...</div>
        </div>
    </div>

    <!-- Tokens -->
    <div id="view-tokens" class="content" style="display:none;">
        <div class="card">
            <h3>Tokens d'accès</h3>
            <div id="tokens-list">Chargement...</div>
        </div>
    </div>

    <!-- Logs -->
    <div id="view-logs" class="content" style="display:none;">
        <div class="card">
            <h3>Activité récente</h3>
            <div id="logs-list">Chargement...</div>
        </div>
    </div>
</div>

<script>
let TOKEN = '';
const API = '/admin/api';

function headers() { return { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' }; }

async function doLogin() {
    TOKEN = document.getElementById('token-input').value;
    try {
        const r = await fetch(`${API}/health`, { headers: headers() });
        if (r.ok) {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            loadDashboard();
        } else {
            document.getElementById('login-error').textContent = 'Token invalide';
            document.getElementById('login-error').style.display = 'block';
        }
    } catch(e) {
        document.getElementById('login-error').textContent = 'Erreur de connexion';
        document.getElementById('login-error').style.display = 'block';
    }
}

function doLogout() {
    TOKEN = '';
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-view').style.display = 'block';
    document.getElementById('token-input').value = '';
}

function showView(name) {
    document.querySelectorAll('[id^="view-"]').forEach(v => v.style.display = 'none');
    document.getElementById(`view-${name}`).style.display = 'block';
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    if (name === 'dashboard') loadDashboard();
    if (name === 'tokens') loadTokens();
    if (name === 'logs') loadLogs();
}

async function loadDashboard() {
    const r = await fetch(`${API}/health`, { headers: headers() });
    const d = await r.json();
    document.getElementById('health-info').innerHTML = `
        <table>
            <tr><td>Service</td><td><strong>${d.service_name}</strong></td></tr>
            <tr><td>Version</td><td>${d.version}</td></tr>
            <tr><td>Python</td><td>${d.python_version}</td></tr>
            <tr><td>Outils</td><td>${d.tools_count} (${d.tools?.join(', ')})</td></tr>
            <tr><td>S3</td><td><span class="badge ${d.s3_configured ? 'badge-ok' : 'badge-err'}">${d.s3_configured ? 'Configuré' : 'Non configuré'}</span></td></tr>
        </table>`;
}

async function loadTokens() {
    const r = await fetch(`${API}/tokens`, { headers: headers() });
    const d = await r.json();
    if (!d.tokens?.length) { document.getElementById('tokens-list').innerHTML = '<p style="color:var(--muted)">Aucun token (S3 non configuré ou vide)</p>'; return; }
    let html = '<table><tr><th>Client</th><th>Permissions</th><th>Hash</th><th>État</th></tr>';
    d.tokens.forEach(t => {
        html += `<tr><td>${t.client_name}</td><td>${t.permissions?.join(', ')}</td><td><code>${t.hash_prefix}...</code></td><td><span class="badge ${t.revoked ? 'badge-err' : 'badge-ok'}">${t.revoked ? 'Révoqué' : 'Actif'}</span></td></tr>`;
    });
    html += '</table>';
    document.getElementById('tokens-list').innerHTML = html;
}

async function loadLogs() {
    const r = await fetch(`${API}/logs`, { headers: headers() });
    const d = await r.json();
    if (!d.logs?.length) { document.getElementById('logs-list').innerHTML = '<p style="color:var(--muted)">Aucune activité</p>'; return; }
    let html = '<table><tr><th>Méthode</th><th>Path</th><th>Status</th><th>Durée</th></tr>';
    d.logs.reverse().forEach(l => {
        html += `<tr><td>${l.method}</td><td>${l.path}</td><td>${l.status}</td><td>${l.duration_ms}ms</td></tr>`;
    });
    html += '</table>';
    document.getElementById('logs-list').innerHTML = html;
}

// Auto-refresh logs toutes les 5s
setInterval(() => { if (document.getElementById('view-logs').style.display !== 'none') loadLogs(); }, 5000);
</script>
</body>
</html>

# docker-compose.yml — Service MCP + WAF
#
# Usage :
#   docker compose build
#   docker compose up -d
#   docker compose logs -f
#
# Architecture réseau :
#   Internet → WAF (port 8082) → mon-mcp (port 8002, réseau interne)
#   Le service MCP n'est PAS exposé directement.

services:

  # ─────────────────────────────────────────────────────────────
  # WAF — Caddy + Coraza OWASP CRS + Rate Limiting
  # ─────────────────────────────────────────────────────────────
  waf:
    build: ./waf
    ports:
      - "${WAF_PORT:-8082}:8082"
    volumes:
      - ./waf/Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-:8082}
    depends_on:
      - mon-mcp
    restart: unless-stopped
    networks:
      - mcp-net

  # ─────────────────────────────────────────────────────────────
  # Service MCP — Votre application (réseau interne uniquement)
  # ─────────────────────────────────────────────────────────────
  mon-mcp:
    build: .
    # PAS de "ports:" — expose uniquement sur le réseau interne
    expose:
      - "8002"
    env_file: .env
    restart: unless-stopped
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8002/health'); assert r.status_code==200"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────────────────────────────
  # Ajouter vos services backend ici (base de données, cache...)
  # Ils ne sont PAS exposés publiquement.
  # ─────────────────────────────────────────────────────────────

networks:
  mcp-net:
    driver: bridge
